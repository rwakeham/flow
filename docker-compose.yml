services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flow
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://flow:${POSTGRES_PASSWORD}@db:5432/flow
      FLOW_PASSWORD: ${FLOW_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./frontend:/app/frontend:ro
      - backupdata:/backups

volumes:
  pgdata:
  backupdata:
